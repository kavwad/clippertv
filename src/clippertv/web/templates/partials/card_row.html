<div class="card-row" id="card-{{ card.id }}">
    <div class="card-info">
        <form class="card-rename-form"
              hx-post="/settings/cards/{{ card.id }}/rename"
              hx-target="#card-{{ card.id }}"
              hx-swap="outerHTML">
            <input type="text"
                   name="rider_name"
                   value="{{ card.rider_name }}"
                   class="card-name-input"
                   title="Click to rename">
        </form>
        <span class="card-account">{{ card.account_number }}</span>
    </div>
    <button class="card-delete"
            hx-delete="/settings/cards/{{ card.id }}"
            hx-target="#card-{{ card.id }}"
            hx-swap="outerHTML"
            hx-confirm="Delete this card?">Delete</button>
</div>
