<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="htmx-config" content='{"globalViewTransitions": true}'>
    <title>ClipperTV</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-preload@2.1.0"></script>
</head>
<body hx-ext="preload">
    {% if request.user.is_authenticated %}
    <nav class="site-nav">
        <span class="nav-user">{{ request.user.display_name }}</span>
        <div class="nav-links">
            <a href="/settings">Settings</a>
            <form method="post" action="/logout" style="display:inline">
                <button type="submit" class="nav-logout">Log out</button>
            </form>
        </div>
    </nav>
    {% if request.user.needs_reauth %}
    <div class="reauth-banner">
        Your Clipper credentials need updating.
        <a href="/settings">Go to Settings</a> or log out and back in.
    </div>
    {% endif %}
    {% endif %}
    {% block content %}{% endblock %}

    <script>
        // Tab switching (used by dashboard.js)
        function switchTab(tabGroup, tabName) {
            const group = document.getElementById(tabGroup);
            group.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabName);
            });
            group.querySelectorAll('.tab-content').forEach(content => {
                content.classList.toggle('active', content.id === tabName);
            });
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
