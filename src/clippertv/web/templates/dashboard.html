{% extends "base.html" %}

{% block content %}
<div class="rider-selector">
    {% for r in riders %}
    <a href="/?rider={{ r }}"
       hx-get="/partials/dashboard?rider={{ r }}"
       hx-target="#dashboard-content"
       hx-swap="innerHTML transition:true"
       hx-push-url="/?rider={{ r }}"
       preload="mousedown"
       class="rider-btn {% if r == rider %}active{% endif %}">{{ r }}</a>
    {% endfor %}
</div>

<h1>Welcome to Clipper TV!</h1>

<div id="dashboard-content">
{% include "partials/dashboard_content.html" %}
</div>
{% endblock %}

{% block scripts %}
<script src="/static/dashboard.js"></script>
{% if rider is not none %}
<script>loadCharts('{{ rider }}');</script>
{% endif %}
{% endblock %}
