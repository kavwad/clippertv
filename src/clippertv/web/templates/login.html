{% extends "base.html" %}

{% block content %}
<div class="login-container">
    <h1>ClipperTV</h1>
    <p class="login-subtitle">Sign in with your Clipper account</p>

    <div id="login-error">
        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}
    </div>

    <form hx-post="/login"
          hx-target="#login-error"
          hx-swap="innerHTML"
          hx-indicator="#login-spinner"
          hx-disabled-elt="button[type='submit']"
          class="login-form">
        <input
            type="email"
            name="email"
            placeholder="Clipper email"
            required
            autocomplete="email"
            class="form-input"
        >
        <input
            type="password"
            name="password"
            placeholder="Clipper password"
            required
            autocomplete="current-password"
            class="form-input"
        >
        <button type="submit" class="form-button">
            Sign in
        </button>
        <div id="login-spinner" class="htmx-indicator login-loading">
            Verifying with Clipper...
        </div>
    </form>
</div>
{% endblock %}
